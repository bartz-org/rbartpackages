# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

# revs are frozen to commit SHAs (tags are mutable); update with
# 'pre-commit autoupdate --freeze'

exclude: '^\.asv/results/.+\.json$'
default_stages: [pre-commit]
default_install_hook_types:
  [
    pre-commit,
    commit-msg,
    pre-merge-commit,
    post-commit,
    post-checkout,
    post-merge,
    post-rewrite,
  ]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # frozen: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-ast
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-executables-have-shebangs
      - id: check-illegal-windows-names
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: check-toml
      - id: check-yaml
      - id: destroyed-symlinks
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: forbid-submodules
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: name-tests-test
        args: [--pytest-test-first]
        exclude: tests/(util\.py|_.+\.py)$
      - id: trailing-whitespace
        exclude: '^renv/activate\.R$' # because renv edits it automatically, with trailing whitespace
      - id: no-commit-to-branch
  - repo: https://github.com/sbrunner/hooks
    rev: 582fe216b7f3beb4c1ee949432c0e124909b6dbd # frozen: 1.7.0
    hooks:
      - id: copyright
      - id: copyright-required
        files: \.(py|rst)$
        # generated headerless file; untracked, so it only reaches hooks via
        # an explicit `pre-commit run --files`
        exclude: src/rbartpackages/_version\.py$
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 22f0422809455ec89ffdcf5a00170ba816e42ddb # frozen: v0.15.16
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/DanielNoord/pydocstringformatter
    rev: d5190a85272ddf6a3d14bfd88ab327f84aa2a0a7 # frozen: v0.7.5
    hooks:
      - id: pydocstringformatter
        # config in [tool.pydocstringformatter] (pyproject.toml); the hook
        # already passes --write --quiet. Scoped to the library, whose numpy
        # attribute-docstring conventions this enforces; drop `files` to widen.
        files: ^src/rbartpackages/.*\.py$
  - repo: https://github.com/jsh9/pydoclint
    rev: da69fbd1c05ff6f4ec46bf9be17a27e06601f076 # frozen: 0.8.6
    hooks:
      - id: pydoclint
  - repo: https://github.com/henryiii/validate-pyproject-schema-store
    rev: a4ec1952e236bbc3b6ec29909724a33ff9d83327 # frozen: 2026.05.28
    hooks:
      - id: validate-pyproject
  - repo: https://github.com/jorisroovers/gitlint
    rev: acc9d9de6369b76d22cb4167029d2035e8730b98 # frozen: v0.19.1
    hooks:
      - id: gitlint # this is already defined to run in stage commit-msg
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: c665864e22f27255a10d82e14f8ccea6843fd65e # frozen: 0.11.19
    hooks:
      - id: uv-lock
  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca # frozen: v1.7.12
    hooks:
      - id: actionlint
  - repo: local
    hooks:
      - id: lint-merged-tree
        name: full lint on the merged tree
        # Runs only at merge time (not on ordinary commits). Gates clean
        # auto-merges, whose merge commit git writes without invoking the
        # `pre-commit` stage: catches a merged tree that fails the hooks even
        # though each branch passed in isolation (e.g. a stale WORKAROUND or a
        # hook config changed on one side). `make lint` is `pre-commit run
        # --all-files`; nesting it here is safe (this hook is not in the
        # pre-commit stage, so --all-files does not re-trigger it).
        entry: make lint
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-merge-commit]
      - id: refresh-editable-version
        name: refresh the editable install's git-derived version
        # WORKAROUND(uv<0.11.20): uv's git cache-keys cannot detect new commits
        # in linked worktrees (see the cache-keys comment in pyproject.toml), so
        # the editable rbartpackages's version goes stale; refresh it whenever
        # HEAD moves. Fixed upstream by uv#19706 (merged after 0.11.19, so first
        # released in 0.11.20); drop this hook once the CI-pinned uv reaches it.
        # `--inexact` avoids pruning extras (e.g. jax), `--frozen` avoids
        # touching uv.lock mid-rebase, and the venv check skips worktrees
        # without an environment (e.g. right after `worktree add`);
        # UV_PROJECT_ENVIRONMENT is the only uv setting that moves the venv.
        entry: sh -c 'test ! -d "${UV_PROJECT_ENVIRONMENT:-.venv}" || uv sync --frozen --inexact --quiet --reinstall-package rbartpackages'
        language: system
        pass_filenames: false
        always_run: true
        stages: [post-commit, post-checkout, post-merge, post-rewrite]
      - id: check-workarounds
        name: check stale WORKAROUND markers
        entry: uv run --dev python config/check_workarounds.py
        language: system
        pass_filenames: false
        always_run: true
      - id: check-path-headers
        name: check the `rbartpackages/<path>` comment matches each file's location
        entry: uv run --dev python config/check_path_headers.py
        language: system
        # self-scopes to files carrying the rbartpackages license header; `text`
        # just keeps binaries (e.g. .inv) out of the argument list.
        types: [text]
      # ty is installed as a dev dependency and configured under [tool.ty] in
      # pyproject.toml. Runs as a whole-project check (per-file would miss
      # cross-file breakage), gated on python/toml files since those drive its
      # result.
      - id: ty
        name: ty check
        entry: uv run --dev ty check
        language: system
        pass_filenames: false
        types_or: [python, toml]
      - id: check-returns-docstring
        name: forbid multi-line non-list `Returns` docstring sections
        # Matches a numpy-style `Returns` block whose first two non-blank lines
        # are both at the section's base indent: i.e., multi-line prose. List-
        # form (description on a more-indented continuation line) is skipped via
        # `(?P=i)\S`; the trailing lookahead skips the next section's header.
        language: pygrep
        entry: '^(?P<i>[ \t]*)Returns[ \t]*\n(?P=i)-+[ \t]*\n(?P=i)(?!""")\S[^\n]*\n(?:[ \t]*\n)*(?P=i)(?!""")(?!\w+[ \t]*\n(?P=i)-+[ \t]*$)\S'
        args: [--multiline]
        types: [python]
      - id: forbid-napoleon-type-colon
        name: forbid stray colon in first line of attribute docstrings
        # A lone colon in the first line of an attribute docstring makes sphinx
        # napoleon split it into a `:type:` field, leaking a stray "Type: <text
        # before the colon>" into the html. Napoleon only inspects the docstring's
        # first line, so the match runs from the opening `"""` to the first newline
        # or the closing `"""` (whichever comes first), one-line and multi-line
        # docstrings alike. Matches an attribute assignment or annotation line (one
        # not ending in `:`, i.e. not a def/class header) followed by a same-indent
        # `"""` whose first line holds a lone `:` (not `::`) outside any ``code``
        # span or :role:`target`, with real text after it (a colon at end of line
        # is harmless: napoleon then keeps it in the description). Reword to drop
        # the colon (a comma or semicolon renders the same).
        language: pygrep
        entry: '^(?P<i>[ \t]+)\S[^\n]*[^\n:\s]\n(?P=i)"""(?:``[^`]*``|:[A-Za-z0-9_+.:-]+:`[^`\n]+`|`[^`\n]+`|(?!""")[^:`\n])*:(?!:)(?![A-Za-z0-9_+.:-]+:`)[ \t]*(?!""")\S'
        args: [--multiline]
        types: [python]
      - id: forbid-lam-lamda
        name: forbid `lam`/`lamda` identifier (use `lambda_` per PEP 8)
        language: pygrep
        entry: '\blam(da)?\b'
        types: [python]
      - id: forbid-dunder-all
        name: forbid setting `__all__` in modules
        language: pygrep
        # matches any module-level `__all__` statement (plain/annotated/augmented
        # assignments, `.append`/`.extend`, `del`, etc.). The `^` anchor restricts
        # to column 0, so references inside indented code or docstrings are ignored.
        entry: '^__all__\b'
        types: [python]
