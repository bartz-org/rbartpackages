name: ci
permissions:
  contents: read

on:
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:
  pull_request:
    branches:
      - main

env:
  UV_VERSION: "0.11.16"

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    env:
      SKIP: no-commit-to-branch
      RPY2_CFFI_MODE: ABI
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: ${{ env.UV_VERSION }}

      - name: Determine base ref
        id: refs
        run: |
          from='${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || (startsWith(github.ref, 'refs/heads/') && github.event.before) || '' }}'
          # The first push to a branch (and the extraction commit that created
          # this repo) reports the all-zeros SHA as `before`: there is no prior
          # commit to diff against, so blank it out and let the "all files" run
          # below provide coverage.
          if [ "$from" = '0000000000000000000000000000000000000000' ]; then from=''; fi
          echo "from=$from" >> "$GITHUB_OUTPUT"

      - name: Run pre-commit on changed files
        # even if we run it on all files below, it's convenient to see if something fails in new changes first
        if: steps.refs.outputs.from != ''
        run: make lint ARGS='--verbose --show-diff-on-failure --from-ref=${{ steps.refs.outputs.from }} --to-ref=HEAD'

      - name: Run pre-commit on all files
        # this is for when pre-commit itself is changed, which may affect unchanged files
        run: make lint ARGS='--verbose --all-files'

      - name: Run gitlint on new commits
        if: steps.refs.outputs.from != ''
        run: uvx --from gitlint-core gitlint --commits=${{ steps.refs.outputs.from }}..HEAD --fail-without-commits --debug

  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      benchmarks-matrix: ${{ steps.set-matrix.outputs.benchmarks-matrix }}
    steps:
      - id: set-matrix
        run: |
          BENCHMARKS_BASE_MATRIX='[
            {
              "id": "latest",
              "runs-on": "ubuntu-latest",
              "vars": ""
            }
          ]'

          BENCHMARKS_MATRIX=$(echo "$BENCHMARKS_BASE_MATRIX" | jq -c ".")

          echo "benchmarks-matrix={\"include\":$BENCHMARKS_MATRIX}" >> $GITHUB_OUTPUT

  tests:
    name: ${{ matrix.target }}/${{ matrix.group }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # The list of groups lives in `Makefile` as `GROUPS`; keep this in sync.
        target: [tests, tests-old]
        group: [bart, others]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          cache-suffix: -${{ matrix.target }}-${{ matrix.group }}

      - name: Install Java (needed by the R package bartMachine via rJava)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v4
        with:
          distribution: temurin
          # bartMachine 1.4.2 ships jars compiled for Java 21 (class file
          # version 65); an older JRE fails with UnsupportedClassVersionError.
          java-version: "21"

      - name: Install R
        uses: r-lib/actions/setup-r@a51a8012b0aab7c32ef9d19bf54da93f3254335e # v2
        with:
          r-version: "renv"

      - name: Make R aware of Java (for rJava)
        run: sudo R CMD javareconf

      - name: Install R dependencies
        uses: r-lib/actions/setup-renv@a51a8012b0aab7c32ef9d19bf54da93f3254335e # v2
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure R PATHS for rpy2 (Linux only)
        run: |
          # rpy2 embeds libR directly, so R's own `etc/ldpaths` (which adds the
          # JVM dir to the loader path) never runs; rJava then can't find
          # libjvm.so when bartMachine loads its namespace. Put it on the path
          # explicitly. $JAVA_HOME is exported by the setup-java step above.
          echo "R_HOME=$(R RHOME)" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$(R RHOME)/lib:${JAVA_HOME}/lib/server${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
          ldd "$(R RHOME)/library/methods/libs/methods.so" || true
          uv run --dev python -c "import rpy2.situation as s; print('\n'.join(map(str, s.iter_info())))"

      - name: Run unit tests
        timeout-minutes: 30
        # NPROC=0 disables pytest-xdist: the small CI runners OOM under
        # parallel test execution. Each matrix cell runs one group serially.
        run: make ${{ matrix.target }} GROUP=${{ matrix.group }} NPROC=0

      - name: Save coverage information
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          archive: false # the artifact name is equal to the file name
          path: .coverage*
          include-hidden-files: true
          if-no-files-found: error

  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ startsWith(github.ref, 'refs/tags/') && 'main' || '' }}
          fetch-depth: 0 # this fetches the full history

      - name: Ensure main branch exists (for asv publish)
        run: |
          git branch main origin/main || true
          git branch --set-upstream-to=origin/main main || true

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install Java (needed by the R package bartMachine via rJava)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v4
        with:
          distribution: temurin
          # bartMachine 1.4.2 ships jars compiled for Java 21 (class file
          # version 65); an older JRE fails with UnsupportedClassVersionError.
          java-version: "21"

      - name: Install R
        uses: r-lib/actions/setup-r@a51a8012b0aab7c32ef9d19bf54da93f3254335e # v2
        with:
          r-version: "renv"

      - name: Make R aware of Java (for rJava)
        run: sudo R CMD javareconf

      - name: Install R dependencies
        uses: r-lib/actions/setup-renv@a51a8012b0aab7c32ef9d19bf54da93f3254335e # v2
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure R PATHS for rpy2
        run: |
          # See the tests job: rpy2 bypasses R's ldpaths, so put the JVM dir on
          # the loader path for rJava (used when docs/examples touch bartMachine).
          echo "R_HOME=$(R RHOME)" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$(R RHOME)/lib:${JAVA_HOME}/lib/server${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Generate benchmarks visualization
        # asv-discover writes benchmarks.json so `asv publish` has a target even
        # with no committed results (e.g. this fresh repo); once benchmark runs
        # are committed it renders those too.
        run: RPY2_CFFI_MODE=ABI make asv-discover asv-publish

      - name: Generate documentation
        run: RPY2_CFFI_MODE=ABI make docs docs-latest

      - name: Save documentation
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: docs
          path: |
            _site/docs
            _site/docs-dev
            _site/benchmarks
          if-no-files-found: error

  covreport:
    runs-on: ubuntu-latest
    needs: [tests]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: ${{ env.UV_VERSION }}

      - name: Get coverage files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: .coverage*
          merge-multiple: true

      - name: List files
        run: |
          pwd
          ls -a
          ls src/rbartpackages

      - name: Print coverage debug
        run: |
          uv run --dev python -m coverage debug config
          uv run --dev python -m coverage debug sys
          uv run --dev python -m coverage debug data

      - name: Generate coverage report
        run: make covreport

      - name: Save coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: covreport
          path: _site/coverage
          if-no-files-found: error

      - name: Check coverage threshold
        run: make covcheck

  diffcov:
    name: diffcov
    # Changed-lines coverage only makes sense relative to a PR base branch.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [tests]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # fetch-depth 0 fetches all branches/tags, so origin/<base> and the
          # PR merge base are available for the diff.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: ${{ env.UV_VERSION }}

      - name: Get coverage files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: .coverage*
          merge-multiple: true

      - name: Check changed-lines coverage
        run: make diffcov DIFF_BASE=origin/${{ github.base_ref }}

      - name: Write report to job summary
        if: always()
        run: test -f diffcov.md && cat diffcov.md >> "$GITHUB_STEP_SUMMARY" || true

  deploy:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    needs: [docs, covreport]

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Verify tag commit is on main
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git fetch origin main
          git merge-base --is-ancestor HEAD origin/main \
            || { echo "Tag commit is not on main branch"; exit 1; }

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Get documentation and benchmarks
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: docs
          path: _site

      - name: Get coverage report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: covreport
          path: _site/coverage

      - name: List files
        run: |
          pwd
          ls -a
          ls -a _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

  benchmarks:
    name: benchmarks-${{ matrix.id }}
    needs: setup-matrix
    runs-on: ${{ matrix.runs-on }}

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup-matrix.outputs.benchmarks-matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          cache-suffix: -${{ matrix.id }}

      - name: Get machine information for asv
        run: RPY2_CFFI_MODE=ABI uv run --dev python -m asv machine --yes

      - name: Run asv in quick mode
        run: ${{ matrix.vars }}make asv-quick

  dev-commands:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: ${{ env.UV_VERSION }}

      - name: run IPython
        run: RPY2_CFFI_MODE=ABI make ipython ARGS=config/ipython/profile_default/startup/startup.ipy

      - name: run IPython with old toolchain
        run: RPY2_CFFI_MODE=ABI make ipython-old ARGS=config/ipython/profile_default/startup/startup.ipy

      - name: Update package version
        run: make copy-version

      - name: Update locked dependencies
        run: make update-deps

      - name: Bump oldest supported dependencies
        run: make update-oldest-deps

  required-dummy:
    runs-on: ubuntu-latest
    needs:
      - pre-commit
      - tests
      - docs
      - covreport
      - diffcov
      - benchmarks
      - dev-commands
    steps:
      - name: Do nothing
        run: echo "Hey doc what's up"
