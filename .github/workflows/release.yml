name: release
permissions:
  contents: read

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      # rpy2-rinterface ships no wheels and needs R at build time in API mode;
      # ABI mode builds without R, and the smoke test below never touches rpy2.
      RPY2_CFFI_MODE: ABI
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: ".python-version"
      - name: Update pip
        run: python -m pip install --upgrade pip
      - name: Determine expected version
        id: version
        env:
          TAG: ${{ github.event.release.tag_name }}
        # the release event carries the tag (e.g. v1.2.3); strip the leading `v`
        # for the PyPI version. Empty on workflow_dispatch (no release context).
        run: echo "expected=${TAG#v}" >> "$GITHUB_OUTPUT"
      - name: Install software
        env:
          EXPECTED: ${{ steps.version.outputs.expected }}
        run: python -m pip install "rbartpackages${EXPECTED:+==$EXPECTED}"
      - name: Check the installed version
        env:
          EXPECTED: ${{ steps.version.outputs.expected }}
        run: |
          installed=$(python -c 'import rbartpackages; print(rbartpackages.__version__)')
          echo "installed rbartpackages $installed (expected ${EXPECTED:-<latest>})"
          if [ -n "$EXPECTED" ] && [ "$installed" != "$EXPECTED" ]; then
            echo "::error::installed $installed does not match released $EXPECTED"
            exit 1
          fi
