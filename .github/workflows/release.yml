name: release
permissions:
  contents: read

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      # rpy2-rinterface ships no wheels and needs R at build time in API mode;
      # ABI mode builds without R, and the smoke test below never touches rpy2.
      RPY2_CFFI_MODE: ABI
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: ".python-version"
      - name: Update pip
        run: python -m pip install --upgrade pip
      - name: Install software
        run: python -m pip install rbartpackages
      - name: Try to import it
        run: python -c 'import rbartpackages;print(rbartpackages.__version__)'
